# reusable workflow triggered by other actions
name: CI

on:
  workflow_call:
    secrets:
      CHARMCRAFT_CREDENTIALS:
        required: true

jobs:

  lint:
    name: Lint Check
    runs-on: ubuntu-24.04

    steps:
    - name: Check out code
      uses: actions/checkout@v6

    - name: Install dependencies
      run: sudo apt-get install python3-pip tox

    - name: Lint code
      run: tox -e lint

  unit:
    name: Unit Test
    runs-on: ubuntu-24.04

    steps:
    - name: Check out code
      uses: actions/checkout@v6

    - name: Install dependencies
      run: sudo apt-get install python3-pip tox

    - name: Run unit tests
      run: tox -e unit

  pack-velero-operator:
    name: Pack Velero Operator charm
    uses: canonical/data-platform-workflows/.github/workflows/build_charm.yaml@v42.0.0
    with:
      path-to-charm-directory: .
      cache: true

  pack-test-charm:
    name: Pack interface consumer charm
    uses: canonical/data-platform-workflows/.github/workflows/build_charm.yaml@v42.0.0
    with:
      path-to-charm-directory: tests/integration/test_charm
      cache: true

  setup:
    name: Setup tests
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}

    steps:
    - name: Check out repo
      uses: actions/checkout@v6

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: 3.13

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y jq

    - name: Discover individual tests
      id: discover
      run: |
        tests=$(find tests/integration -maxdepth 1 -type f -name 'test_*.py' \
          | sort -u \
          | jq -R -s -c 'split("\n")[:-1]')
        echo "$tests"

        if [ "$tests" = "[]" ]; then
          echo "No integration tests discovered via filesystem lookup"
          exit 1
        fi

        echo "matrix={\"test_file\":$tests}" >> "$GITHUB_OUTPUT"

  integration:
    name: Integration Test
    runs-on: ubuntu-24.04
    needs:
      - pack-velero-operator
      - pack-test-charm
      - setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
    - name: Check out repo
      uses: actions/checkout@v6

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: 3.13

    - name: Set up Node and NPM
      uses: actions/setup-node@v4
      with:
        node-version: 21

    - name: Download built charm artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: packed-charm-*
        merge-multiple: true
        path: ./charms

    - name: Set charm paths
      run: |
        # Find each charm file by its expected prefix
        VELERO_OPERATOR_CHARM_PATH=$(find ./charms -type f -name 'velero-operator_*.charm' -print -quit)
        TEST_CHARM_PATH=$(find ./charms -type f -name 'test-charm-velero_*.charm' -print -quit)
        echo "VELERO_OPERATOR_CHARM_PATH=$VELERO_OPERATOR_CHARM_PATH" >> $GITHUB_ENV
        echo "TEST_CHARM_PATH=$TEST_CHARM_PATH" >> $GITHUB_ENV
        echo "Velero Operator charm: $VELERO_OPERATOR_CHARM_PATH"
        echo "Test charm: $TEST_CHARM_PATH"

    - name: Setup operator environment
      run: |
        python -m pip install --upgrade pip
        python -m pip install tox

        sudo snap install --classic concierge
        sudo concierge prepare -p k8s

    - name: Run integration tests
      run: tox -vve integration -- --model testing ${{ matrix.test_file }}

    # On failure, capture debugging resources
    - name: Get all
      run: kubectl get all -A
      if: failure()

    - name: Describe deployments
      run: kubectl describe deployments -A
      if: failure()

    - name: Describe Velero Storage locations
      run: |
        kubectl describe backupstoragelocations -A
        kubectl describe volumesnapshotlocations -A
      if: failure()

    - name: Describe Velero Backups and Restores
      run: |
        kubectl describe backups -A
        kubectl describe restores -A
      if: failure()

    - name: Describe replicasets
      run: kubectl describe replicasets -A
      if: failure()

    - name: Get juju status
      run: juju status
      if: failure()

    - name: Get operator logs
      run: juju debug-log --replay --include velero-operator/0
      if: failure()
